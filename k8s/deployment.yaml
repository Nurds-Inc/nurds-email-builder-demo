apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-builder-demo
  namespace: nurds-email-builder-demo
  labels:
    app.kubernetes.io/name: email-builder-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: email-builder-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: email-builder-demo
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: email-builder-demo
          image: ghcr.io/nurds-inc/nurds-email-builder-demo@sha256:92fb5e809774441fa475d8590a2b44ba32909feb3fc570745e0133d0f450c527
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: nginx-config
          configMap:
            name: email-builder-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
